<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 250" width="1000" height="250">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@500&amp;display=swap');
      
      .bg { fill: #1e1e20; }
      .grid-line { stroke: rgba(255, 255, 255, 0.07); stroke-width: 1.5; }
      .node { fill: rgba(255, 255, 255, 0.2); }
      
      .title {
        font-family: 'Share Tech Mono', monospace;
        font-size: 52px;
        fill: #ffffff;
        letter-spacing: 2px;
      }
      
      .subtitle {
        font-family: 'Fira Code', monospace;
        font-size: 24px;
        fill: #9CA3AF;
      }

      /* Animasi Kursor Berkedip */
      .cursor {
        fill: #ffffff;
        animation: blink 1s step-end infinite;
      }
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
    
    <clipPath id="type-title">
      <rect x="50" y="60" width="0" height="70">
        <animate attributeName="width" from="0" to="480" dur="1.5s" fill="freeze" />
      </rect>
    </clipPath>
    
    <clipPath id="type-sub">
      <rect x="50" y="140" width="0" height="40">
        <animate attributeName="width" from="0" to="620" begin="1.5s" dur="1.8s" fill="freeze" />
      </rect>
    </clipPath>
  </defs>

  <rect width="100%" height="100%" class="bg" rx="10" />

  <g>
    <path d="M0 50 L150 150 L300 20 L500 200 L700 50 L900 180 L1000 100" class="grid-line" fill="none" />
    <path d="M150 150 L200 250 M300 20 L400 -20 M500 200 L600 300 M700 50 L850 -10 M900 180 L950 300" class="grid-line" fill="none" />
    <path d="M0 150 L150 50 L300 180 L500 50 L700 200 L900 50 L1000 180" class="grid-line" fill="none" />
    
    <circle cx="150" cy="150" r="3" class="node" />
    <circle cx="300" cy="20" r="3" class="node" />
    <circle cx="500" cy="200" r="3" class="node" />
    <circle cx="700" cy="50" r="3" class="node" />
    <circle cx="900" cy="180" r="3" class="node" />
  </g>

  <g>
    <text x="50" y="115" class="title" clip-path="url(#type-title)">ADJIE PRASETYA</text>
    
    <rect x="50" y="73" width="22" height="48" fill="#ffffff">
      <animate attributeName="x" values="50; 480" dur="1.5s" fill="freeze" />
      <animate attributeName="opacity" values="1;0" begin="1.5s" dur="0.1s" fill="freeze" />
    </rect>

    <text x="50" y="170" class="subtitle" clip-path="url(#type-sub)">AI Engineer | ML Ops | Tech Enthusiast</text>
    
    <rect x="50" y="147" width="14" height="26" fill="#9CA3AF" opacity="0">
      <animate attributeName="opacity" values="0;1" begin="1.5s" dur="0.1s" fill="freeze" />
      <animate attributeName="x" values="50; 605" begin="1.5s" dur="1.8s" fill="freeze" />
      <animate attributeName="opacity" values="1;0;1" begin="3.3s" dur="1s" repeatCount="indefinite" />
    </rect>
  </g>

  <g transform="translate(820, 65) scale(3.5)">
    <path d="M12,0 v1 h5 v1 h1 v6 h-1 v-1 h-3 v-1 h-4 v-2 h1 v-1 h1 v-1 h-1 v-1 z M13,1 h1 v1 h-1 z M5,7 h1 v3 h1 v2 h1 v1 h1 v1 h1 v2 h-1 v-1 h-1 v1 h-2 v-1 h-1 v-1 h-1 v1 h-2 v-1 h-1 v-3 h1 v-2 h2 v-1 h1 v-1 z M10,17 h1 v3 h-1 z M14,17 h1 v3 h-1 z" fill="none" stroke="#ffffff" stroke-width="1.2" stroke-linejoin="miter" />
    <path d="M12,0 v1 h5 v1 h1 v6 h-1 v-1 h-3 v-1 h-4 v-2 h1 v-1 h1 v-1 h-1 v-1 z M5,7 h1 v3 h1 v2 h1 v1 h1 v1 h1 v2 h-1 v-1 h-1 v1 h-2 v-1 h-1 v-1 h-1 v1 h-2 v-1 h-1 v-3 h1 v-2 h2 v-1 h1 v-1 z M10,17 h1 v3 h-1 z M14,17 h1 v3 h-1 z" fill="#000000" />
    <rect x="13" y="1" width="1" height="1" fill="#ffffff" />
  </g>
</svg>
